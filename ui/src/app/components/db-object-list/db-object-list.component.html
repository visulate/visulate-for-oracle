@if (currentContext.objectType) {
  <div class="object-grid">
    @for (objectName of objectList; track objectName) {
      <a class="object-item" 
         [class.active]="objectName==currentContext.objectName"
         routerLink="/database/{{currentContext.endpoint}}/{{currentContext.owner}}/{{currentContext.objectType}}/{{objectName}}"
         [queryParams]="{filter: currentContext.filter}">
        {{objectName}}
      </a>
    }
  </div>
}
